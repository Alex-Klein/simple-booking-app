services:
  app:
    container_name: cabin-app
    build:
      context: .
      args:
        VITE_APP_NAME: ${VITE_APP_NAME}
        MIN_STAY: ${MIN_STAY:-2}
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      NODE_ENV: production
      DB_PATH: /data/cabin.db
      DATA_DIR: /data
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    external: true
