services:
  app:
    build:
      context: .
      args:
        VITE_APP_NAME: ${VITE_APP_NAME}
    ports:
      - "80:${PORT:-3001}"
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      NODE_ENV: production
      DB_PATH: /data/cabin.db
      DATA_DIR: /data
    restart: unless-stopped
