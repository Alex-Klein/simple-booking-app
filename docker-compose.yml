services:
  app:
    build:
      context: .
      args:
        VITE_APP_NAME: ${VITE_APP_NAME}
        MIN_STAY: ${MIN_STAY:-2}
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      NODE_ENV: production
      DB_PATH: /data/cabin.db
      DATA_DIR: /data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/tmp/nginx.conf.template:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
    command:
      - /bin/sh
      - -c
      - "envsubst '$${DOMAIN} $${PORT}' < /tmp/nginx.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"
    environment:
      DOMAIN: ${DOMAIN}
      PORT: ${PORT:-3001}
    depends_on:
      - app
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./data/certbot/www:/var/www/certbot
      - ./data/certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: unless-stopped
